name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    name: Generate Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. GitHub Stats card ───────────────────────────────────────────────
      - name: Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.stats.svg
          base: header, activity, community, repositories
          plugin_lines: yes
          config_timezone: UTC
          config_display: regular
          config_order: base.header, base.activity, base.community, base.repositories
          config_output: svg

      # ── 2. Streak / calendar (isocalendar plugin) ──────────────────────────
      - name: Streak
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.streak.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: UTC
          config_output: svg

      # ── 3. Top languages ───────────────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, cmake, shell,
            gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 10
          config_timezone: UTC
          config_output: svg
