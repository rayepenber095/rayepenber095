name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual trigger
  push:
    branches:
      - main             # Runs on push to main branch

jobs:
  github-metrics:
    name: Generate Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to commit files

    steps:
      # ── Checkout repository ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. GitHub Stats card ─────────────────────────────────────────
      - name: Generate Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.stats.svg
          base: header, activity, community, repositories
          plugin_lines: yes
          config_timezone: UTC
          config_display: regular
          config_order: base.header, base.activity, base.community, base.repositories
          config_output: svg

      # ── 2. Streak / calendar ────────────────────────────────────────
      - name: Generate Streak
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.streak.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: UTC
          config_output: svg

      # ── 3. Top languages ────────────────────────────────────────────
      - name: Generate Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, cmake, shell,
            gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 10
          config_timezone: UTC
          config_output: svg

      # ── 4. GitHub Trophy (Official ryo-ma action) ────────────────────
      - name: Generate Trophy
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: ${{ github.actor }}
          output_path: ./assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          # Note: Theme support might be different in official action
          # The official action doesn't support all themes via workflow params
          # You may need to append parameters to the filename or use environment variables

      # ── 5. Create assets directory if it doesn't exist ───────────────
      - name: Ensure assets directory exists
        run: mkdir -p assets

      # ── 6. Commit and push all generated files ───────────────────────
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add all SVG files and assets folder
          git add *.svg assets/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GitHub metrics and trophy [skip ci]"
            
            # Pull latest changes before pushing (prevents rejection error)
            git pull --rebase origin main
            git push origin main
          fi
        shell: bash

  # Optional: Separate job for artifact upload if needed
  upload-artifacts:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    needs: github-metrics
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload trophy artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-trophy
          path: assets/trophy.svg
          if-no-files-found: warn
